<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do App</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  }

  .phone {
    width: 360px;
    background: #f5f5f5;
    border-radius: 40px;
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    position: relative;
  }

  .notch {
    width: 120px;
    height: 28px;
    background: #1a1a2e;
    border-radius: 0 0 16px 16px;
    margin: -20px auto 16px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .header h1 {
    font-size: 22px;
    color: #1a1a2e;
  }

  .header .time {
    font-size: 14px;
    color: #888;
    font-weight: 600;
  }

  .input-area {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .input-area input {
    flex: 1;
    padding: 12px 16px;
    border: none;
    border-radius: 12px;
    background: white;
    font-size: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    outline: none;
  }

  .input-area input:focus {
    box-shadow: 0 0 0 2px #6c63ff;
  }

  .input-area button {
    width: 44px;
    height: 44px;
    border: none;
    border-radius: 12px;
    background: #6c63ff;
    color: white;
    font-size: 22px;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .input-area button:hover {
    background: #5a52e0;
  }

  .counter {
    font-size: 13px;
    color: #999;
    margin-bottom: 10px;
  }

  .task-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 380px;
    overflow-y: auto;
  }

  .task-list li {
    background: white;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 15px;
    color: #333;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .task-list li::before {
    content: '○';
    color: #ccc;
    font-size: 18px;
    transition: color 0.15s;
  }

  .task-list li:hover {
    background: #ffe0e0;
    text-decoration: line-through;
  }

  .task-list li:hover::before {
    content: '✕';
    color: #e74c3c;
    font-weight: bold;
  }

  .empty-msg {
    text-align: center;
    color: #bbb;
    padding: 40px 0;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="header">
    <h1>Tareas</h1>
    <span class="time" id="clock">12:00</span>
  </div>

  <div class="input-area">
    <input type="text" id="taskInput" placeholder="Escribe una tarea..." autofocus>
    <button id="addBtn">+</button>
  </div>

  <div class="counter" id="counter">0 tareas</div>

  <ul class="task-list" id="taskList">
    <li class="empty-msg">No hay tareas pendientes</li>
  </ul>
</div>

<script>
  const input = document.getElementById('taskInput');
  const addBtn = document.getElementById('addBtn');
  const list = document.getElementById('taskList');
  const counter = document.getElementById('counter');

  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      String(now.getHours()).padStart(2, '0') + ':' +
      String(now.getMinutes()).padStart(2, '0');
  }
  updateClock();
  setInterval(updateClock, 10000);

  function updateCounter() {
    const items = list.querySelectorAll('li:not(.empty-msg)');
    const len = items.length;
    counter.textContent = len === 0 ? '0 tareas' : len + ' tarea' + (len === 1 ? '' : 's');
    const empty = list.querySelector('.empty-msg');
    if (len === 0 && !empty) {
      const msg = document.createElement('li');
      msg.className = 'empty-msg';
      msg.textContent = 'No hay tareas pendientes';
      list.appendChild(msg);
    } else if (len > 0 && empty) {
      empty.remove();
    }
  }

  function addTask(text) {
    const trimmed = text.trim();
    if (!trimmed) return;

    const li = document.createElement('li');
    li.textContent = trimmed;
    li.addEventListener('click', function () {
      this.remove();
      updateCounter();
    });
    list.appendChild(li);
    updateCounter();
  }

  addBtn.addEventListener('click', () => {
    addTask(input.value);
    input.value = '';
    input.focus();
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      addBtn.click();
    }
  });
</script>
</body>
</html>
