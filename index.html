<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenCode Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0e1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background-color 1s ease;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #00d4ff, #007bff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(0, 180, 255, 0.3);
      margin-bottom: 2rem;
    }

    .neon-btn {
      background: transparent;
      border: 2px solid #00b4ff;
      color: #00b4ff;
      padding: 1rem 3rem;
      font-size: 1.2rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(0, 180, 255, 0.2);
      position: relative;
      overflow: hidden;
    }

    .neon-btn:hover {
      background: #00b4ff;
      color: #0a0e1a;
      box-shadow: 0 0 30px rgba(0, 180, 255, 0.6);
      transform: translateY(-2px);
    }

    .neon-btn:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>OpenCode Dashboard</h1>
    <button class="neon-btn" id="colorBtn">Cambiar Color</button>
  </div>

  <script>
    const colors = [
      '#0a0e1a',
      '#1a0a2e',
      '#0a1a2e',
      '#2e0a1a',
      '#0a2e1a',
      '#1a2e0a',
      '#2e1a0a',
      '#0a1a1a',
    ];

    let currentIndex = 0;
    const btn = document.getElementById('colorBtn');

    btn.addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % colors.length;
      document.body.style.backgroundColor = colors[currentIndex];
    });
  </script>
</body>
</html>
